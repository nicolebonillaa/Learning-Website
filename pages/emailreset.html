<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Learning Website</title>
        <link rel="icon" type="image/png" href="/main/images/redpanda.png">

        <!-- Google fonts for website using indie flower -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">

        <!-- Preload custom cursor images for faster loading -->
        <link rel="preload" href="/main/images/cursor-assets/cursor-active.png" as="image">
        <link rel="preload" href="/main/images/cursor-assets/cursor-passive.png" as="image">

        <link rel="stylesheet" href="/main/style.css">
    </head>
    <body>
        <div class="logo__header">
            <a href="/" class="nav__logo">
            <img src="/main/images/redpanda.png" alt="Logo" class="logo"><span>Learning Website</span>
            </a>
        </div>
    <section class="login">
        <article class="login__details">
            <h1>Update Email</h1>
            <p>Enter your new email address below.</p>
            <form class="email__reset__form auth__form" action="/emailreset" method="post">
                <input type="hidden" id="resettoken" name="token">
                <div class="form__control">
                    <label for="newemail">New email:</label>
                    <input type="email" id="newemail" name="newemail" placeholder="Enter your new email address">
                </div>
                <div class="form__control">
                    <label for="confirmnewemail">Confirm new email:</label>
                    <input type="email" id="confirmnewemail" name="confirmnewemail" placeholder="Confirm your new email address">
                </div>
                <input class="btn primary" type="submit" value="Update Email" id="emailresetbtn" disabled>
            </form>
        </article>
        <article class="login__logo">
            <img src="/main/images/pandasmart.png" alt="Website logo">
        </article>
    </section>
    <script src="/main/main.js"></script>
     </body>
</html>
