 <!--Login page for learning website-->
<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Log in to the learning website</title>
        <link rel="icon" type="image/png" href="/main/images/redpanda.png">

        <!-- Google fonts for website using indie flower -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="/main/style.css">
    </head>
    <body>
        <div class="logo__header">
            <a href="/" class="nav__logo">
            <img src="/main/images/redpanda.png" alt="Logo" class="logo"><span>Learning Website</span>
        </a>
    </div>
        <section class="login">
            <article class="login__details">
                <h1>Login</h1>
                <p>Welcome back! Please enter your login details to access your account and continue your learning journey.</p>
                <form class="login__form" action="/login" method="post">
                    <div class ="form__control">
                        <label for="username">Username</label>
                        <input type="username" id="username" placeholder="Enter your username">
                    </div>
                    <div class ="form__control">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password">
                    </div>
                    <div class="login__extras">
                        <div>
                            <input type="checkbox" id="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        <a href="">Forgot password</a>
                    </div>
                    <input class="btn primary" type="submit" value="Login">
                    <!--<button class="btn">
                        <img src="/main/images/google.png" alt="Google logo">
                        <p>Sign in with Google</p>
                    </button> if i want google sign in-->
                </form>
                <small class="next__page">Don't have an account? <a href="/signup">Sign up</a></small>
            </article>
            <article class="login__logo">
                <img src="/main/images/pandasmart.png" alt="Website logo">
            </article>
        </section>
    <script src="/main/main.js"></script>
     </body>
</html>
