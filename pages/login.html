 <!--Login page for learning website-->
<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Log in - Ailurus Learning</title>
        <link rel="icon" type="image/png" href="/main/images/website_icon.png">

        <!-- Google fonts for website using indie flower -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">

        <!-- Preload custom cursor images for faster loading -->
        <link rel="preload" href="/main/images/cursor-assets/cursor-active.png" as="image">
        <link rel="preload" href="/main/images/cursor-assets/cursor-passive.png" as="image">

        <link rel="stylesheet" href="/main/style.css">
    </head>
    <body>
        <div class="logo__header">
            <a href="/" class="nav__logo">
            <img src="/main/images/redpanda.png" alt="Logo" class="logo"><span>Ailurus Learning</span>
        </a>
    </div>
        <section class="login">
            <article class="login__details">
                <h1>Login</h1>
                <p>Welcome back! Please enter your login details to access your account and continue your learning journey.</p>
                <form class="login__form auth__form" action="/login" method="post">
                    <div class ="form__control">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Enter your username">
                    </div>
                    <div class ="form__control">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password">
                    </div>
                    <input class="btn primary" type="submit" value="Login" id="loginbtn" disabled>
                </form>
                <small class="next__page">Don't have an account? <a href="/signup">Sign up</a></small>
            </article>
            <article class="login__logo">
                <img src="/main/images/pandasmart.png" alt="Website logo">
            </article>
        </section>
    <script src="/main/main.js"></script>
     </body>
</html>
