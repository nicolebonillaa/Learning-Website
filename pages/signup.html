<!--Sign up page for learning website-->
<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign up - Ailurus Learning</title>
        <link rel="icon" type="image/png" href="/main/images/website_icon.png">

        <!-- Google fonts for website using indie flower -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">

        <!-- Preload custom cursor images for faster loading -->
        <link rel="preload" href="/main/images/cursor-assets/cursor-active.png" as="image">
        <link rel="preload" href="/main/images/cursor-assets/cursor-passive.png" as="image">

        <link rel="stylesheet" href="/main/style.css">
    </head>
    <body>
        <div class="logo__header">
            <a href="/" class="nav__logo">
            <img src="/main/images/website_icon.png" alt="Logo" class="logo"><span>Learning Website</span>
        </a>
    </div>
        <section class="login">
            <article class="login__details">
                <h1>Sign up</h1>
                <p>Fill the form below to create your account.</p>
                <form class="signup__form auth__form"  action="/signup" method="post">
                    <div class ="form__control">
                        <label for="signupfullname">Full Name</label>
                        <input type="fullname" id="signupfullname" placeholder="Enter your full name">
                    </div>
                    <div class ="form__control">
                        <label for="signupusername">Username</label>
                        <input type="text" id="signupusername" placeholder="Create your username">
                    </div>
                    <div class ="form__control">
                        <label for="signupemail">Email</label>
                        <input type="email" id="signupemail" placeholder="Enter your email">
                    </div>
                    <div class ="form__control">
                        <label for="signuppassword">Password</label>
                        <input type="password" id="signuppassword" placeholder="Enter your password">
                    </div>
                    <div class ="form__control">
                        <label for="cpassword">Confirm Password</label>
                        <input type="password" id="cpassword" placeholder="Confirm your password">
                    </div>
                    <input class="btn primary" type="submit" value="Sign up">
                    <label th:text="${serverReply}"></label>
                    <!--<button class="btn">
                        <img src="/main/images/google.png" alt="Google logo">
                        <p>Sign in with Google</p>
                    </button> if i want google sign in-->
                </form>
                <small class="next__page">Already have an account? <a href="/login">Login</a></small>
            </article>
            <article class="login__logo">
                <img src="/main/images/pandasmart.png" alt="Website logo">
            </article>
        </section>
    <script src="/main/main.js"></script>
     </body>
</html>
